name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality-and-build:
    name: Quality And Build
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://transcendence:ci-password@127.0.0.1:5432/transcendence?schema=public

    services:
      postgres:
        image: postgres:18.3-alpine
        env:
          POSTGRES_DB: transcendence
          POSTGRES_USER: transcendence
          POSTGRES_PASSWORD: ci-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U transcendence -d transcendence"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bun run prisma:generate

      - name: Check formatting
        run: bun run format:check

      - name: Lint code
        run: bun run lint

      - name: Apply database migrations
        run: bun run prisma:migrate:deploy

      - name: Run tests
        run: bun test

      - name: Start Redis smoke service
        run: |
          docker run -d \
            --name redis-smoke \
            -p 6379:6379 \
            redis:8-alpine \
            redis-server --appendonly yes --requirepass ci-redis-password

          for attempt in {1..20}; do
            if docker exec redis-smoke redis-cli -a ci-redis-password --no-auth-warning ping | grep -q PONG; then
              exit 0
            fi

            sleep 1
          done

          docker logs redis-smoke
          exit 1

      - name: Run Redis integration smoke
        env:
          REDIS_SMOKE_URL: redis://:ci-redis-password@127.0.0.1:6379/0
        run: bun run test:redis:smoke

      - name: Cache Next.js build output
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/.next/cache
          key: >-
            ${{ runner.os }}-nextjs-${{ hashFiles('bun.lock') }}-${{ hashFiles('package.json', 'next.config.ts', 'tsconfig.json', 'postcss.config.mjs', 'components.json', 'app/**', 'public/**', 'shared/**', 'realtime/**', 'prisma/**', 'proxy.ts') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('bun.lock') }}-

      - name: Build app
        env:
          BETTER_AUTH_SECRET: ci_better_auth_secret_change_me_32_chars
          BETTER_AUTH_URL: http://localhost:3000
        run: bun run build:next

      - name: Install Playwright browsers
        run: bun run pw:install --with-deps

      - name: Run Playwright E2E tests
        env:
          BETTER_AUTH_SECRET: ci_better_auth_secret_change_me_32_chars
          BETTER_AUTH_URL: http://localhost:3000
          PLAYWRIGHT_WEB_SERVER_COMMAND: bun run start
          REALTIME_INTERNAL_SECRET: ci_realtime_internal_secret_change_me
          REALTIME_INTERNAL_URL: http://127.0.0.1:3001/internal/game-update
          SOCKET_CORS_ORIGIN: http://localhost:3000
        run: |
          bun run start:realtime > /tmp/realtime.log 2>&1 &
          REALTIME_PID=$!

          cleanup() {
            kill "$REALTIME_PID" 2>/dev/null || true
            wait "$REALTIME_PID" 2>/dev/null || true
          }

          trap cleanup EXIT

          for attempt in {1..20}; do
            if curl --fail --silent http://127.0.0.1:3001/health > /tmp/realtime-health.json; then
              cat /tmp/realtime-health.json
              bun run test:e2e
              exit $?
            fi

            if ! kill -0 "$REALTIME_PID" 2>/dev/null; then
              break
            fi

            sleep 1
          done

          cat /tmp/realtime.log
          exit 1

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload Playwright test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/
          if-no-files-found: ignore
          retention-days: 7

      - name: Validate Compose config
        env:
          BETTER_AUTH_SECRET: ci_better_auth_secret_change_me_32_chars
          POSTGRES_PASSWORD: ci-password
          REALTIME_INTERNAL_SECRET: ci_realtime_internal_secret_change_me
        run: docker compose -f docker-compose.yml -f docker-compose.dev.yml config

      - name: Smoke test realtime server
        run: |
          bun run start:realtime > /tmp/realtime.log 2>&1 &
          REALTIME_PID=$!

          cleanup() {
            kill "$REALTIME_PID" 2>/dev/null || true
            wait "$REALTIME_PID" 2>/dev/null || true
          }

          trap cleanup EXIT

          for attempt in {1..20}; do
            if curl --fail --silent http://127.0.0.1:3001/health > /tmp/realtime-health.json; then
              cat /tmp/realtime-health.json
              exit 0
            fi

            if ! kill -0 "$REALTIME_PID" 2>/dev/null; then
              break
            fi

            sleep 1
          done

          cat /tmp/realtime.log
          exit 1
