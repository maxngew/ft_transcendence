services:
  database:
    image: postgres:18.3-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-transcendence}
      POSTGRES_USER: ${POSTGRES_USER:-transcendence}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - transcendence
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  database-backup:
    image: postgres:18.3-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-transcendence}
      POSTGRES_USER: ${POSTGRES_USER:-transcendence}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_HOST: database
      POSTGRES_PORT: 5432
      POSTGRES_BACKUP_DIR: /backups
      POSTGRES_BACKUP_DISABLED: ${POSTGRES_BACKUP_DISABLED:-false}
      POSTGRES_BACKUP_INTERVAL_SECONDS: ${POSTGRES_BACKUP_INTERVAL_SECONDS:-86400}
      POSTGRES_BACKUP_RETENTION_DAYS: ${POSTGRES_BACKUP_RETENTION_DAYS:-7}
    command: ["sh", "/usr/local/bin/postgres-backup-loop"]
    depends_on:
      database:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - postgres_backups:/backups
      - ./scripts/postgres-backup-loop.sh:/usr/local/bin/postgres-backup-loop:ro
      - ./scripts/postgres-backup.sh:/usr/local/bin/postgres-backup:ro
      - ./scripts/postgres-restore.sh:/usr/local/bin/postgres-restore:ro
    networks:
      - transcendence

  redis:
    image: redis:8-alpine
    command:
      [
        "sh",
        "-c",
        'if [ -n "$$REDIS_PASSWORD" ]; then exec redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD"; else exec redis-server --appendonly yes; fi',
      ]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    networks:
      - transcendence
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'if [ -n "$$REDIS_PASSWORD" ]; then redis-cli -a "$$REDIS_PASSWORD" --no-auth-warning ping; else redis-cli ping; fi',
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  app:
    build:
      context: .
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-transcendence}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@database:5432/${POSTGRES_DB:-transcendence}?schema=public
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET is required}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-https://localhost:8443}
      BETTER_AUTH_TRUSTED_ORIGINS: ${BETTER_AUTH_TRUSTED_ORIGINS:-${BETTER_AUTH_URL:-https://localhost:8443}}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      POSTGRES_BACKUP_DIR: /backups
      POSTGRES_BACKUP_DISABLED: ${POSTGRES_BACKUP_DISABLED:-false}
      POSTGRES_BACKUP_INTERVAL_SECONDS: ${POSTGRES_BACKUP_INTERVAL_SECONDS:-86400}
      POSTGRES_BACKUP_RETENTION_DAYS: ${POSTGRES_BACKUP_RETENTION_DAYS:-7}
      OPERATIONS_STATUS_TOKEN: ${OPERATIONS_STATUS_TOKEN:-}
      OPERATIONS_STATUS_USER_IDS: ${OPERATIONS_STATUS_USER_IDS:-}
      OPERATIONS_STATUS_USERNAMES: ${OPERATIONS_STATUS_USERNAMES:-}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      RATE_LIMIT_REDIS_URL: ${RATE_LIMIT_REDIS_URL:-${REDIS_URL:-redis://redis:6379/0}}
      RATE_LIMIT_REDIS_KEY_PREFIX: ${RATE_LIMIT_REDIS_KEY_PREFIX:-transcendence:rate-limit:}
      RATE_LIMIT_REDIS_FAIL_OPEN: ${RATE_LIMIT_REDIS_FAIL_OPEN:-false}
      BETTER_AUTH_REDIS_URL: ${BETTER_AUTH_REDIS_URL:-${REDIS_URL:-redis://redis:6379/0}}
      BETTER_AUTH_REDIS_KEY_PREFIX: ${BETTER_AUTH_REDIS_KEY_PREFIX:-better-auth:}
      REALTIME_INTERNAL_URL: http://realtime:3001/internal/game-update
      REALTIME_FRIENDSHIP_INTERNAL_URL: http://realtime:3001/internal/friendship-update
      REALTIME_INTERNAL_SECRET: ${REALTIME_INTERNAL_SECRET:?REALTIME_INTERNAL_SECRET is required}
      SOCKET_PUBLIC_URL: ${SOCKET_PUBLIC_URL:-}
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - app_storage:/app/storage
    networks:
      - transcendence
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  realtime:
    build:
      context: .
    command: ["bun", "run", "start:realtime"]
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-transcendence}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@database:5432/${POSTGRES_DB:-transcendence}?schema=public
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET is required}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-https://localhost:8443}
      BETTER_AUTH_TRUSTED_ORIGINS: ${BETTER_AUTH_TRUSTED_ORIGINS:-${BETTER_AUTH_URL:-https://localhost:8443}}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      REALTIME_REDIS_URL: ${REALTIME_REDIS_URL:-${REDIS_URL:-redis://redis:6379/0}}
      REALTIME_PRESENCE_REDIS_KEY_PREFIX: ${REALTIME_PRESENCE_REDIS_KEY_PREFIX:-transcendence:presence:}
      REALTIME_INTERNAL_SECRET: ${REALTIME_INTERNAL_SECRET:?REALTIME_INTERNAL_SECRET is required}
      SOCKET_HOST: 0.0.0.0
      SOCKET_PORT: 3001
      SOCKET_CORS_ORIGIN: ${SOCKET_CORS_ORIGIN:-https://localhost:8443}
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - transcendence
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "fetch('http://127.0.0.1:3001/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  realtime-outbox:
    build:
      context: .
    command: ["bun", "run", "realtime:drain-outbox:loop"]
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-transcendence}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@database:5432/${POSTGRES_DB:-transcendence}?schema=public
      REALTIME_INTERNAL_SECRET: ${REALTIME_INTERNAL_SECRET:?REALTIME_INTERNAL_SECRET is required}
      REALTIME_INTERNAL_URL: http://realtime:3001/internal/game-update
      REALTIME_OUTBOX_DRAIN_DISABLED: ${REALTIME_OUTBOX_DRAIN_DISABLED:-false}
      REALTIME_OUTBOX_DRAIN_INTERVAL_SECONDS: ${REALTIME_OUTBOX_DRAIN_INTERVAL_SECONDS:-5}
      REALTIME_OUTBOX_DRAIN_LIMIT: ${REALTIME_OUTBOX_DRAIN_LIMIT:-25}
    depends_on:
      app:
        condition: service_healthy
      database:
        condition: service_healthy
      realtime:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - transcendence

  caddy:
    image: caddy:2.11.2-alpine
    environment:
      CADDY_DEFAULT_SNI: ${CADDY_DEFAULT_SNI:-localhost}
      CADDY_SITE_ADDRESS: ${CADDY_SITE_ADDRESS:-https://localhost:8443}
    depends_on:
      app:
        condition: service_healthy
      realtime:
        condition: service_healthy
    ports:
      - "8443:8443"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - transcendence

networks:
  transcendence:
    driver: bridge

volumes:
  app_storage:
  caddy_config:
  caddy_data:
  postgres_backups:
  postgres_data:
  redis_data:
