services:
  database:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  app:
    build:
      target: dev
    environment:
      NODE_ENV: development
      SOCKET_PUBLIC_URL: ${SOCKET_PUBLIC_URL:-}
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
      - app_next:/app/.next
      - app_generated:/app/generated
    healthcheck:
      start_period: 40s

  realtime:
    build:
      target: dev
    command: ["bun", "run", "dev:realtime"]
    depends_on:
      app:
        condition: service_healthy
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      SOCKET_HOST: 0.0.0.0
      SOCKET_PORT: 3001
      SOCKET_CORS_ORIGIN: ${SOCKET_CORS_ORIGIN:-https://localhost:8443}
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
    healthcheck:
      start_period: 5s

  realtime-outbox:
    build:
      target: dev
    environment:
      NODE_ENV: development
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules

volumes:
  app_generated:
  app_node_modules:
  app_next:
